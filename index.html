<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Css-Chain-Selectors</title>
  </head>
  <body>
    <div>
      <img
        class="avatar proportioned"
        src="./images/first-image.jpg"
        alt="Picture of a lady with glasses"
      />
      <img
        class="avatar distorted"
        src="./images/second-image.jpg"
        alt="picture of a man who is shocked"
      />
    </div>
    <div>
      <img
        class="original proportioned"
        src="./images/first-image.jpg"
        alt="Picture of a lady with glasses"
      />
      <img
        class="original distorted"
        src="./images/second-image.jpg"
        alt="picture of a man who is shocked"
      />
    </div>
  </body>
</html>
